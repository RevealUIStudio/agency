name: Private Leak Scan

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main, test]

permissions:
  contents: read

jobs:
  check-no-private-leaks:
    name: Private path / customer name / operator ID leak scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
      - name: Run leak scanner
        run: bash scripts/check-no-private-leaks.sh
